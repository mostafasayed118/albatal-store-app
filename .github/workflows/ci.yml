name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  setup:
    name: Setup & Cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

  analyze:
    name: Format & Analyze
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-pub

  test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - name: Run tests with coverage
        run: flutter test --no-pub --coverage

      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '[\d.]+(?=%)')
          echo "Line coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc -l)" -eq 1 ]; then
            echo "ERROR: Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi
          echo "Coverage threshold met."

  deno-test:
    name: Edge Function Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Deno tests
        run: deno test --allow-net --allow-env supabase/functions/

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for leaked secrets
        run: |
          # Fail if any .env files (except .env.example) are tracked
          if git ls-files | grep -E '\.env$|\.env\.' | grep -v '\.env\.example'; then
            echo "ERROR: .env files are tracked in git!"
            exit 1
          fi

          # Check for common secret patterns in source code
          if rg -n --glob '!*.md' --glob '!*.sql' --glob '!*.json' --glob '!*.lock' \
            -e 'PAYMOB_API_KEY\s*=\s*["\x27]?[A-Za-z0-9]' \
            -e 'PAYMOB_HMAC_SECRET\s*=\s*["\x27]?[A-Fa-f0-9]' \
            -e 'SUPABASE_SERVICE_ROLE_KEY\s*=\s*["\x27]?eyJ' \
            ; then
            echo "ERROR: Potential secrets found in source code!"
            exit 1
          fi

          echo "No secrets detected."

  deploy-check:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [analyze, test, deno-test, secret-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Verify no deprecated functions
        run: |
          # Ensure removed functions do not exist
          for fn in paymob-order paymob-auth paymob-payment-key vodafone-cash-payment vodafone-cash-verify; do
            if [ -d "supabase/functions/$fn" ]; then
              echo "ERROR: Deprecated function $fn still exists!"
              exit 1
            fi
          done
          echo "All deprecated functions removed."

      - name: Verify active functions exist
        run: |
          for fn in checkout paymob-initiate paymob-callback cancel-expired-orders send-order-notification; do
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "ERROR: Active function $fn is missing!"
              exit 1
            fi
          done
          echo "All active functions present."

      - name: Verify migration sequence
        run: |
          ls -1 supabase/migrations/*.sql | head -20
          echo "Migration files present."

  deno-edge-functions:
    name: Deno Edge Function Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Edge Function unit tests
        run: |
          deno test --allow-net supabase/functions/paymob-callback/hmac_test.ts
          deno test supabase/functions/paymob-initiate/paymob_initiate_test.ts

  android-release:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: [analyze, test, secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks

      - name: Create key.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Verify package identity
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Release APK not found at $APK_PATH"
            exit 1
          fi

          # Check package name is not com.example.*
          PACKAGE=$(aapt dump badging "$APK_PATH" 2>/dev/null | grep "package: name=" | sed "s/.*name='\([^']*\)'.*/\1/")
          echo "APK package: $PACKAGE"

          if [[ "$PACKAGE" == com.example.* ]]; then
            echo "ERROR: Release APK uses placeholder package: $PACKAGE"
            exit 1
          fi

          echo "Package identity verified: $PACKAGE"

      - name: Verify APK is not debug-signed
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          # Check signing info — debug-signed APKs have specific characteristics
          if aapt dump badging "$APK_PATH" 2>/dev/null | grep -q "debuggable=true"; then
            echo "WARNING: APK may be debug-signed (debuggable flag set)"
          else
            echo "APK signing verification passed"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
